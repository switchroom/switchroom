# Switchroom CI pipeline.
#
# Set the Buildkite pipeline's initial command to:
#   buildkite-agent pipeline upload
# so this file is loaded on every build.
#
# Runs on Buildkite-hosted agents (queue: hosted, LINUX_AMD64_2X4 shape) so
# no self-hosted infrastructure is required. Bun is bootstrapped per-step
# because the default hosted image doesn't include it; we cache it under
# ~/.bun across builds via the hosted-agent built-in cache.
#
# Auth for the eval stages:
#   The eval steps fetch CLAUDE_CODE_OAUTH_TOKEN from the cluster secret
#   store at runtime (buildkite-agent secret get). Manage the secret via:
#     POST/PATCH /v2/organizations/{org}/clusters/{cluster_id}/secrets
#   If the secret is missing AND ANTHROPIC_API_KEY is not in env, the
#   eval steps no-op (exit 0) so they don't block the build.
#
# Step skipping (if_changed):
#   Each step declares the file globs that should trigger it. Pure-doc
#   commits (no .ts/.py/.yml/.md-skill changes) build empty (just the
#   pipeline upload) — no compute spent. Touching `.buildkite/pipeline.yml`
#   re-runs everything by listing it in every if_changed.
#
# Cost protection (timeout_in_minutes):
#   Every step has a wall-clock cap so a hung test or an infinite-loop
#   bug doesn't run to the agent's default max (~60 min) and burn
#   compute. Caps: lint=5, core=15, plugin=8, evals=30, summary=5.
#   When tweaking, leave at least 2× current p99 of the step.
#
# bun install speed:
#   Every step uses `--prefer-offline --no-progress`. Prefer-offline
#   skips registry round-trips when the cache already has the package
#   (~5-10s saved per warm-cache build); no-progress drops terminal
#   redraw noise from the build log.
#
# Eval steps:
#   `claude-code` global is install-skipped when it's already on PATH
#   from a cache restore. The `~/.npm` cache (key `v1-claude-code-global`)
#   carries the package metadata across builds; the binary symlink under
#   /usr/local/bin survives because the hosted-agent image preserves it
#   when present.
#
# bktec (#107):
#   Re-enable gated by SWITCHROOM_USE_BKTEC=1 cluster env. The TEST_FILE
#   patterns are now comma-separated (no brace expansion — bktec's zzglob
#   library doesn't honour `{a,b}` and silently exits 16 when given them).
#   Once the cluster env flips on, the bktec block discovers tests
#   correctly and parallel sharding kicks in. See block at line ~145.

agents:
  queue: "hosted"

steps:
  - label: ":lock: Type check"
    key: lint
    timeout_in_minutes: 5
    if_changed:
      - "**/*.ts"
      - "**/*.tsx"
      - "tsconfig.json"
      - "package.json"
      - "bun.lock"
      - "telegram-plugin/package.json"
      - "telegram-plugin/bun.lock"
      - ".buildkite/pipeline.yml"
    command: |
      # Skip bun install if the ~/.bun cache already restored the binary.
      # The cache is keyed by bun.lock checksum (see `cache.key` below), so
      # hitting this path means the lockfile is unchanged since the last build.
      if [ ! -x "$$HOME/.bun/bin/bun" ]; then
        curl -fsSL https://bun.sh/install | bash
      fi
      export PATH="$$HOME/.bun/bin:$$PATH"
      # --prefer-offline: skip registry lookups when the cache already has
      # the package; saves ~5-10s per build on warm caches.
      # --no-progress: cleaner CI logs, no terminal-redraw noise.
      bun install --frozen-lockfile --prefer-offline --no-progress
      bun lint
    cache:
      paths:
        - "~/.bun"
        - "node_modules/"
      key: "v1-bun-{{ checksum 'bun.lock' }}"
    retry:
      automatic:
        - exit_status: -1   # agent lost
          limit: 2
        - exit_status: 143  # SIGTERM (spot termination)
          limit: 2

  - label: ":vitest: Core tests"
    key: tests-core
    timeout_in_minutes: 15
    # Stub token so importing server.ts (via cross-package coverage of
    # telegram-plugin/tests/*.test.ts) doesn't boot the legacy monolith path
    # and demand a live TELEGRAM_BOT_TOKEN. Tests never actually poll Telegram.
    env:
      TELEGRAM_BOT_TOKEN: "123456:stub-for-tests"
    if_changed:
      - "src/**"
      - "tests/**"
      - "telegram-plugin/**/*.ts"
      - "vitest.config.ts"
      - "tsconfig.json"
      - "package.json"
      - "bun.lock"
      - "telegram-plugin/package.json"
      - "telegram-plugin/bun.lock"
      - ".buildkite/pipeline.yml"
    command: |
      if [ ! -x "$$HOME/.bun/bin/bun" ]; then
        curl -fsSL https://bun.sh/install | bash
      fi
      export PATH="$$HOME/.bun/bin:$$PATH"
      bun install --frozen-lockfile --prefer-offline --no-progress
      # vitest also runs telegram-plugin/tests/*.test.ts (excluding bun-only
      # history.test.ts) for cross-package coverage, so install plugin deps.
      (cd telegram-plugin && bun install --frozen-lockfile --prefer-offline --no-progress)
      # Build dist/ before tests. Several integration tests under tests/
      # (cli.issues.test.ts, run-hook.test.ts, boot-self-test.test.ts) shell
      # out to dist/cli/switchroom.js to exercise the same binary path
      # production hooks call. Without this step those tests fail with
      # "Cannot find module 'dist/cli/switchroom.js'" and the Core tests
      # job goes red — which is the state main has been in since #426
      # landed (those tests were added but no build step was wired into
      # CI). Build is fast (~1s) and gated by the same if_changed globs
      # that gate the test run, so this only runs when Core tests do.
      #
      # Invoke the script directly under bun rather than via `bun run
      # build` (which executes `node scripts/build.mjs`). Buildkite
      # hosted agents don't always ship node on PATH; bun was just
      # installed two lines above and has full Node-compat for the
      # stdlib calls scripts/build.mjs makes.
      bun scripts/build.mjs
      # Buildkite Test Engine collector: streams per-test timing to the
      # switchroom-vitest suite. When unset, vitest.config.ts falls back to
      # the default reporter and no upload is attempted.
      export BUILDKITE_ANALYTICS_TOKEN="$$(buildkite-agent secret get ANALYTICS_TOKEN_VITEST 2>/dev/null || true)"
      # Run vitest directly. bktec parallel sharding is opt-in via
      # SWITCHROOM_USE_BKTEC=1 — see the bktec block below. Plain vitest is
      # the default because every Core-tests run since #65 has exited bktec
      # with code 16 (any non-exec error) and the team hasn't had a chance
      # to capture debug logs to diagnose. The bktec block below is wired
      # to capture those logs the next time someone flips the env flag —
      # see CHECKLIST in the comment block immediately below.
      # bktec disabled by default (exit-16 on every Core-tests run since
      # build #65; tracking issue #107). Re-enable with SWITCHROOM_USE_BKTEC=1
      # in the cluster env once you're ready to capture --debug logs.
      if [[ "$$SWITCHROOM_USE_BKTEC" == "1" ]]; then
        # ─── bktec re-enable checklist (skills/buildkite-test-engine) ───
        # 1. SWITCHROOM_TEST_ENGINE_API_TOKEN cluster secret must exist with
        #    the read_suites scope (Personal Settings > API Access Tokens).
        # 2. Confirm the `switchroom-vitest` suite has historical timing
        #    data — without it, bktec falls back to file-count splitting
        #    instead of timing-balanced. The collector is wired in
        #    vitest.config.ts via BUILDKITE_ANALYTICS_TOKEN; check the
        #    Test Engine dashboard.
        # 3. DEBUG_ENABLED=true is on so the build log will print
        #    "Discovering test files with include pattern: ..." +
        #    "Discovered N files" — that confirms the zzglob-based
        #    discoverTestFiles is finding our suite.
        # 4. We do NOT download the bktec binary ourselves: hosted
        #    Buildkite agents have it pre-installed. Downloading v2.3.2
        #    from GitHub Releases shadows whatever fixed version the
        #    hosted image already ships.
        # 5. vitest is not a natively-supported runner, so we use
        #    `custom` with a TEST_CMD that substitutes {{testExamples}}.
        #    The custom runner doesn't need RESULT_PATH (per bktec's
        #    config validation in internal/config/validate.go).
        # 6. **Restore `parallelism: 2` on this step** when re-enabling.
        #    bktec aborts with "BUILDKITE_PARALLEL_JOB_COUNT was 0" without
        #    it. The directive was removed in this PR because plain vitest
        #    runs the suite once, so duplicating jobs would just waste
        #    compute.
        # 7. (#107 fix) The TEST_FILE_PATTERN below is comma-separated, NOT
        #    brace-expanded. bktec's zzglob library does not honor `{a,b}`
        #    brace expansion — patterns containing braces silently match
        #    zero files and bktec exits 16 with "no files found". The
        #    same applies to the EXCLUDE pattern: each excluded path is
        #    listed separately rather than packed into a brace group.
        export BUILDKITE_TEST_ENGINE_API_ACCESS_TOKEN="$$(buildkite-agent secret get SWITCHROOM_TEST_ENGINE_API_TOKEN 2>/dev/null || true)"
        if [[ -n "$$BUILDKITE_TEST_ENGINE_API_ACCESS_TOKEN" ]]; then
          export BUILDKITE_TEST_ENGINE_DEBUG_ENABLED="true"
          export BUILDKITE_TEST_ENGINE_SUITE_SLUG="switchroom-vitest"
          export BUILDKITE_TEST_ENGINE_TEST_RUNNER="custom"
          export BUILDKITE_TEST_ENGINE_TEST_CMD="bunx vitest run {{testExamples}}"
          # Comma-separated globs — bktec's zzglob matches each independently.
          # Order: largest test directories first so the discovery log is
          # human-scannable (you see the bulk first, then the long tail).
          export BUILDKITE_TEST_ENGINE_TEST_FILE_PATTERN="src/**/*.test.ts,telegram-plugin/**/*.test.ts,tests/**/*.test.ts,test/**/*.test.ts,experimental/**/*.test.ts"
          # Exclude list — each path on its own (no brace expansion).
          # Mirrors the vitest.config.ts exclude list for the bun-only suites.
          export BUILDKITE_TEST_ENGINE_TEST_FILE_EXCLUDE_PATTERN="telegram-plugin/tests/history.test.ts,telegram-plugin/tests/ipc-server-client.test.ts,telegram-plugin/tests/ipc-server-race.test.ts,telegram-plugin/tests/gateway-bridge.test.ts,telegram-plugin/tests/gateway-startup-mutex.test.ts,telegram-plugin/tests/gateway-clean-shutdown-marker.test.ts,telegram-plugin/tests/foreman-state.test.ts,telegram-plugin/tests/boot-card-dedupe.test.ts,telegram-plugin/tests/boot-card-reason.test.ts,telegram-plugin/tests/progress-update.test.ts,telegram-plugin/tests/quota-cache.test.ts,telegram-plugin/tests/silent-reply-guard.test.ts,telegram-plugin/tests/unhandled-rejection-policy.test.ts"
          if command -v bktec >/dev/null 2>&1; then
            bktec --version
            bktec run
          else
            echo "SWITCHROOM_USE_BKTEC=1 set but bktec is not pre-installed on this agent. Falling back to plain vitest."
            bun run test:vitest
          fi
        else
          echo "SWITCHROOM_USE_BKTEC=1 set but bktec token unavailable — falling back to plain vitest"
          bun run test:vitest
        fi
      else
        bun run test:vitest
      fi
    cache:
      paths:
        - "~/.bun"
        - "node_modules/"
        - "telegram-plugin/node_modules/"
      key: "v1-bun-{{ checksum 'bun.lock' }}-{{ checksum 'telegram-plugin/bun.lock' }}"
    artifact_paths:
      - "coverage/**/*"
    retry:
      automatic:
        - exit_status: -1
          limit: 2
        - exit_status: 143
          limit: 2

  - label: ":snake: Python tests (Hindsight scripts)"
    key: tests-python
    timeout_in_minutes: 5
    # Closes #472 finding #15 — pre-fix the 80+ Python tests under
    # vendor/hindsight-memory/scripts/tests/ only ran on dev machines.
    # Every Python test added by #468/#469/#470 (recall integration,
    # gateway IPC, directives) was on the honor system. python3 is on
    # the hosted-agent image by default; no install step needed.
    if_changed:
      - "vendor/hindsight-memory/scripts/**"
      - ".buildkite/pipeline.yml"
    command: |
      cd vendor/hindsight-memory/scripts
      python3 -m unittest discover tests/
    retry:
      automatic:
        - exit_status: -1
          limit: 2
        - exit_status: 143
          limit: 2

  - label: ":telegram: Plugin tests (402)"
    key: tests-plugin
    timeout_in_minutes: 8
    # Stub token so `silent-reply-guard.test.ts` and any other test that
    # imports from `../server.js` doesn't trigger the monolith boot path and
    # exit with "TELEGRAM_BOT_TOKEN required".
    env:
      TELEGRAM_BOT_TOKEN: "123456:stub-for-tests"
    if_changed:
      - "telegram-plugin/**"
      - ".buildkite/pipeline.yml"
    command: |
      if [ ! -x "$$HOME/.bun/bin/bun" ]; then
        curl -fsSL https://bun.sh/install | bash
      fi
      export PATH="$$HOME/.bun/bin:$$PATH"
      cd telegram-plugin
      bun install --frozen-lockfile --prefer-offline --no-progress
      bun test
    cache:
      paths:
        - "~/.bun"
        - "telegram-plugin/node_modules/"
      key: "v1-tg-{{ checksum 'telegram-plugin/bun.lock' }}"
    retry:
      automatic:
        - exit_status: -1
          limit: 2
        - exit_status: 143
          limit: 2

  - wait

  # ---------------------------------------------------------------------------
  # Skills evals — only run when API auth is available.
  # Soft-fail so eval flakiness surfaces as a warning rather than blocking
  # the build. Failures still create artifacts and an annotation summary.
  # ---------------------------------------------------------------------------

  - label: ":compass: Skills evals — trigger routing"
    key: evals-trigger
    timeout_in_minutes: 30
    # Serialize eval runs across parallel builds: Anthropic API calls on the
    # subscription OAuth token share a weekly quota, and bunches of evals
    # racing in parallel can burn through it or hit rate limits. Two builds
    # trigger → second one queues until the first finishes.
    concurrency: 1
    concurrency_group: "switchroom/evals-trigger"
    if_changed:
      # Skill text changes can flip routing decisions
      - "skills/**/SKILL.md"
      # Eval framework + dataset
      - "evals/run_trigger.py"
      - "evals/trigger_dataset.yaml"
      # Profile CLAUDE.md text influences how the model interprets queries
      - "profiles/**/CLAUDE.md*"
      - ".buildkite/pipeline.yml"
    command: |
      # Prefer the API key (separate billing pool) over the OAuth token
      # (subscription, weekly cap). Both are stored as cluster secrets.
      KEY_FETCHED="$$(buildkite-agent secret get ANTHROPIC_API_KEY 2>/dev/null || true)"
      if [[ -n "$$KEY_FETCHED" ]]; then
        export ANTHROPIC_API_KEY="$$KEY_FETCHED"
        unset CLAUDE_CODE_OAUTH_TOKEN
      else
        export CLAUDE_CODE_OAUTH_TOKEN="$$(buildkite-agent secret get CLAUDE_CODE_OAUTH_TOKEN 2>/dev/null || true)"
      fi
      if [[ -z "$${ANTHROPIC_API_KEY:-}" && -z "$${CLAUDE_CODE_OAUTH_TOKEN:-}" ]]; then
        echo "No Anthropic credential available — skipping eval"
        exit 0
      fi
      pip install -q pyyaml
      # Skip the global re-install when claude-code is already on PATH from
      # a cache restore (~/.npm + the binary symlink under /usr/local/bin).
      # `npm i -g` is ~20-30s on a cold agent; skipping it on warm cache
      # halves total eval-step latency on the common case.
      if ! command -v claude >/dev/null 2>&1; then
        npm i -g --prefer-offline --no-audit --no-fund @anthropic-ai/claude-code
      fi
      python3 evals/run_trigger.py --parallel 5
    artifact_paths:
      - "evals/results/**/*.json"
    cache:
      paths:
        - "~/.npm"
      key: "v1-claude-code-global"
    soft_fail:
      - exit_status: 1
    retry:
      automatic:
        - exit_status: -1
          limit: 2
        - exit_status: 143
          limit: 2

  - label: ":sparkles: Skills evals — quality"
    key: evals-quality
    timeout_in_minutes: 30
    # Same reasoning as evals-trigger above: serialize to protect the
    # subscription quota + rate limits.
    concurrency: 1
    concurrency_group: "switchroom/evals-quality"
    if_changed:
      - "skills/**/SKILL.md"
      - "evals/run_quality.py"
      - "evals/dataset.yaml"
      - ".buildkite/pipeline.yml"
    command: |
      KEY_FETCHED="$$(buildkite-agent secret get ANTHROPIC_API_KEY 2>/dev/null || true)"
      if [[ -n "$$KEY_FETCHED" ]]; then
        export ANTHROPIC_API_KEY="$$KEY_FETCHED"
        unset CLAUDE_CODE_OAUTH_TOKEN
      else
        export CLAUDE_CODE_OAUTH_TOKEN="$$(buildkite-agent secret get CLAUDE_CODE_OAUTH_TOKEN 2>/dev/null || true)"
      fi
      if [[ -z "$${ANTHROPIC_API_KEY:-}" && -z "$${CLAUDE_CODE_OAUTH_TOKEN:-}" ]]; then
        echo "No Anthropic credential available — skipping eval"
        exit 0
      fi
      pip install -q pyyaml
      if ! command -v claude >/dev/null 2>&1; then
        npm i -g --prefer-offline --no-audit --no-fund @anthropic-ai/claude-code
      fi
      python3 evals/run_quality.py --parallel 5
    artifact_paths:
      - "evals/results/**/*.json"
    cache:
      paths:
        - "~/.npm"
      key: "v1-claude-code-global"
    soft_fail:
      - exit_status: 1
    retry:
      automatic:
        - exit_status: -1
          limit: 2
        - exit_status: 143
          limit: 2

  - wait: ~
    continue_on_failure: true

  - label: ":bar_chart: Eval summary"
    timeout_in_minutes: 5
    depends_on:
      - evals-trigger
      - evals-quality
    allow_dependency_failure: true
    # Best-effort: this step only writes a Buildkite annotation and patches
    # a public badge gist. Neither is load-bearing — every status that
    # matters (build, type-check, tests, evals) already shows on the build
    # page. A red Eval summary should never fail the build, so soft_fail
    # the exit codes the scripts can plausibly produce (1 from a script
    # failure, 2 from buildkite-agent secret/artifact errors). We
    # deliberately do NOT mask agent loss (-1) or signal kills (143) so
    # those infrastructure failures still bubble up.
    soft_fail:
      - exit_status: 1
      - exit_status: 2
    command: |
      mkdir -p evals/results
      # Download to "." — buildkite-agent preserves the artifact's original
      # upload path (`evals/results/...`), so destination must be the build
      # root, not `evals/results/`, otherwise files land at
      # `evals/results/evals/results/*.json` and the script can't find them.
      buildkite-agent artifact download "evals/results/*.json" . || true
      # Annotation + badge publish are independent best-effort steps —
      # gate each one with `|| true` so a failure in one doesn't drop the
      # next, and the step never aborts under buildkite's default `set -e`.
      bash .buildkite/annotate-evals.sh || echo "annotate-evals.sh failed (continuing)"
      export GITHUB_GIST_TOKEN="$$(buildkite-agent secret get GITHUB_GIST_TOKEN 2>/dev/null || true)"
      bash .buildkite/publish-badges.sh || echo "publish-badges.sh failed (continuing)"
